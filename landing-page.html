<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐷 小小猪 AI 助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .avatar { font-size: 60px; text-align: center; margin-bottom: 20px; }
        h1 { text-align: center; color: #333; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .features { margin-bottom: 30px; }
        .feature {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .feature-icon { font-size: 24px; margin-right: 15px; }
        .feature-text { color: #333; }
        .pricing { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 25px;
            color: white;
            margin-bottom: 20px;
        }
        .pricing-title { font-size: 18px; margin-bottom: 15px; }
        .price-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .price-item:last-child { border-bottom: none; }
        .price { font-size: 24px; font-weight: bold; }
        .cta {
            display: block;
            width: 100%;
            padding: 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
        }
        .cta:hover { background: #5568d3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">🐷</div>
        <h1>小小猪 AI 助手</h1>
        <p class="subtitle">你的私人 AI 助手</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">🤖</span>
                <span class="feature-text">AI 聊天 - 问什么答什么</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⏰</span>
                <span class="feature-text">定时提醒 - 起床、开会提醒</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📝</span>
                <span class="feature-text">任务管理 - 帮你记事情</span>
            </div>
        </div>
        
        <div class="pricing">
            <div class="pricing-title">💰 价格</div>
            <div class="price-item">
                <span>免费版</span>
                <span>¥0</span>
            </div>
            <div class="price-item">
                <span>付费版</span>
                <span class="price">¥29/月</span>
            </div>
        </div>
        
        <a href="https://github.com" class="cta">加我体验 →</a>
    </div>
</body>
</html>
